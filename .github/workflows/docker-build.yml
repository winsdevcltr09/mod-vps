name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/winsdevcltr09/mod-vps:latest
            ghcr.io/winsdevcltr09/mod-vps:${{ github.sha }}
          build-args: |
            BORE_SERVER=bore.pub
            BORE_PORT=3977
            BOT_PASSWORD=rairukun2025
            NTFY_TOPIC=render-vps

      - name: Image info
        run: echo "Image pushed - ghcr.io/winsdevcltr09/mod-vps:latest"